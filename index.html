<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pirâmide Invertida</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
    <div class="container d-flex align-items-center justify-content-center min-vh-100" id="nameForm-div">
        <div class="card shadow p-4 w-100" style="max-width: 400px;">
            <h6 id="alert-message" class="alert alert-warning d-none"></h6>
            <form id="nameForm">
                <div class="text-center">
                    <img class="mb-4" src="/public/logo.png" alt=""
                        width="96" height="96">
                    <h1 class="h3 mb-3 fw-normal">Pirâmide Invertida</h1>
                </div>

                <div class="form-floating mb-3">
                    <input type="text" class="form-control" name="fullname" id="fullname" required>
                    <label for="fullname">Insira seu nome completo</label>
                </div>

                <button class="btn btn-primary w-100 py-2" type="submit">Montar sua Piramide</button>
            </form>
        </div>
    </div>
    <div class="values d-none" id="main-values">
        <div class="d-flex flex-column align-items-center">
            <a class="btn btn-primary py-2" type="submit" href="/">Inserir Novo Nome</a> 
        </div>
        <div class="container text-center mt-5" id="piramide"></div>
        <div class="d-flex flex-wrap justify-content-center gap-3 mt-5 px-3" id="video-links"></div>
    </div>
    <script src="/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HoA4AF1cnnrLpgiQd9jDa0qM01V7HW+gxJMy2dd9k+pY8+tSsf0zexiPp6HkFhSl"
        crossorigin="anonymous"></script>
</body>
</html>
